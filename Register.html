<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>71 Lottery Register</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0a0a0a;
color:white;
min-height:100vh;
}

.header{
background:linear-gradient(135deg,#6a00ff,#b026ff);
padding:25px;
text-align:center;
font-size:34px;
font-weight:bold;
}

.container{
width:90%;
max-width:400px;
margin:40px auto;
}

input{
width:100%;
padding:16px;
margin-bottom:15px;
border:none;
outline:none;
border-radius:15px;
background:#1a1a1a;
color:white;
font-size:16px;
}

input::placeholder{
color:#888;
}

.register-btn{
width:100%;
padding:16px;
border:none;
border-radius:30px;
background:linear-gradient(135deg,#6a00ff,#b026ff);
color:white;
font-size:20px;
font-weight:bold;
cursor:pointer;
}

.login-btn{
width:100%;
padding:16px;
margin-top:12px;
border:2px solid #b026ff;
border-radius:30px;
background:transparent;
color:#b026ff;
font-size:20px;
font-weight:bold;
cursor:pointer;
}

.logo{
text-align:center;
font-size:48px;
font-weight:bold;
margin-bottom:30px;
color:#b026ff;
}
</style>
</head>

<body>

<div class="header">
71 Lottery
</div>

<div class="container">

<div class="logo">
🎰
</div>

<input type="text" id="username" placeholder="Username">

<input type="tel" id="mobile" placeholder="Mobile Number">

<input type="password" id="password" placeholder="Password">

<input type="password" id="confirm" placeholder="Confirm Password">

<button class="register-btn" onclick="registerUser()">
Register
</button>

<button class="login-btn" onclick="window.location.href='Login.html'">
Login
</button>

</div>

<script>
function registerUser(){

let username=document.getElementById("username").value;
let mobile=document.getElementById("mobile").value;
let password=document.getElementById("password").value;
let confirm=document.getElementById("confirm").value;

if(username=="" || mobile=="" || password==""){
alert("Please fill all fields");
return;
}

if(password!==confirm){
alert("Passwords do not match");
return;
}

alert("Registration Successful");
window.location.href="Login.html";
}
</script>

</body>
</html>
