<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>71 Lottery Register</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}
body{
background:#0b1437;
color:white;
min-height:100vh;
}
.header{
background:linear-gradient(90deg,#ff5f6d,#ff8a8a);
padding:20px;
text-align:center;
font-size:30px;
font-weight:bold;
}
.container{
width:90%;
max-width:400px;
margin:30px auto;
}
input{
width:100%;
padding:15px;
margin-bottom:15px;
border:none;
border-radius:15px;
background:#1a254f;
color:white;
font-size:16px;
}
button{
width:100%;
padding:15px;
border:none;
border-radius:30px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}
.register{
background:linear-gradient(90deg,#ff5f6d,#ff8a8a);
color:white;
}
.login{
margin-top:10px;
background:transparent;
border:2px solid #ff8a8a;
color:#ff8a8a;
}
</style>
</head>
<body>
<div class="header">
71 Lottery
</div>
<div class="container">
<input type="email" id="email" placeholder="Email Address">
<input type="password" id="password" placeholder="Password">
<input type="password" id="confirm" placeholder="Confirm Password">
<button class="register" onclick="registerUser()">
Register
</button>
<button class="login" onclick="window.location.href='Login.html'">
Login
</button>
</div>
<script>
const supabase = window.supabase.createClient(
"https://ctpgqyofceymakikptyy.supabase.co",
"sb_publishable_2I0doPRyZKeSoV5MAuHA7g_VKk_ODUm"
);
async function registerUser(){
const email=document.getElementById("email").value;
const password=document.getElementById("password").value;
const confirm=document.getElementById("confirm").value;
if(password!==confirm){
alert("Passwords do not match");
return;
}
const { error } = await supabase.auth.signUp({
email: email,
password: password
});
if(error){
alert(error.message);
}else{
alert("Registration Successful");
window.location.href="Login.html";
}
}
</script>
</body>
</html>
