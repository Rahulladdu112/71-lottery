<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>71 Lottery - Register</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}
body{
background:#0f172a;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}
.card{
width:100%;
max-width:400px;
background:#1e293b;
border-radius:25px;
padding:30px;
box-shadow:0 10px 30px rgba(0,0,0,.3);
}
.logo{
text-align:center;
font-size:32px;
font-weight:bold;
color:#facc15;
margin-bottom:10px;
}
.subtitle{
text-align:center;
color:#cbd5e1;
margin-bottom:25px;
}
input{
width:100%;
padding:14px;
margin-bottom:12px;
border:none;
border-radius:12px;
background:#334155;
color:white;
font-size:16px;
}
input::placeholder{
color:#94a3b8;
}
.btn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin-top:8px;
}
.send{
background:#facc15;
color:#111827;
}
.register{
background:#22c55e;
color:white;
}
.message{
margin-top:15px;
text-align:center;
font-size:14px;
color:#cbd5e1;
}
</style>
</head>
<body>
<div class="card">
<div class="logo">🎯 71 LOTTERY</div>
<div class="subtitle">
Register with Email OTP
</div>
<input type="email" id="email" placeholder="Enter Email">
<button class="btn send" onclick="sendOTP()">
Send OTP
</button>
<input type="text" id="otp" placeholder="Enter OTP">
<button class="btn register" onclick="verifyOTP()">
Register
</button>
<div class="message" id="msg"></div>
</div>
<script>
const supabase = window.supabase.createClient(
"https://ctpgqyofceymakikptyy.supabase.co",
"sb_publishable_2I0doPRyZKeSoV5MAuHA7g_VKk_ODUm"
);
async function sendOTP(){
const email = document.getElementById("email").value;
if(!email){
alert("Enter your email");
return;
}
const { error } = await supabase.auth.signInWithOtp({
email: email
});
if(error){
document.getElementById("msg").innerText = error.message;
}else{
document.getElementById("msg").innerText =
"OTP sent to your email.";
}
}
async function verifyOTP(){
const email = document.getElementById("email").value;
const otp = document.getElementById("otp").value;
const { error } = await supabase.auth.verifyOtp({
email: email,
token: otp,
type: "email"
});
if(error){
document.getElementById("msg").innerText = error.message;
}else{
document.getElementById("msg").innerText =
"Registration successful!";
setTimeout(()=>{
window.location.href="index.html";
},1500);
}
}
</script>
</body>
</html>
