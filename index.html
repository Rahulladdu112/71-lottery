<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>71 Lottery</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}
body{
background:linear-gradient(135deg,#0f172a,#111827);
color:white;
min-height:100vh;
}
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
}
.logo{
font-size:28px;
font-weight:bold;
color:#facc15;
}
.menu a{
color:white;
text-decoration:none;
margin-left:15px;
}
.hero{
text-align:center;
padding:100px 20px;
}
.hero h1{
font-size:50px;
margin-bottom:15px;
}
.hero p{
color:#cbd5e1;
font-size:18px;
margin-bottom:30px;
}
.btn{
background:#facc15;
color:black;
padding:14px 30px;
border-radius:12px;
text-decoration:none;
font-weight:bold;
display:inline-block;
}
.features{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:40px;
}
.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border-radius:20px;
padding:25px;
}
.card h3{
color:#facc15;
margin-bottom:10px;
}
footer{
text-align:center;
padding:20px;
margin-top:40px;
color:#94a3b8;
}
</style>
</head>
<body>
<nav>
<div class="logo">71 Lottery</div>
<div class="menu">
<a href="login.html">Login</a>
<a href="register.html">Register</a>
</div>
</nav>
<section class="hero">
<h1>71 Lottery</h1>
<p>Virtual Coin Prediction Game</p>
<a href="register.html" class="btn">Get Started</a>
</section>
<section class="features">
<div class="card">
<h3>Virtual Coins</h3>
<p>Play using free in-game coins.</p>
</div>
<div class="card">
<h3>Fast Rounds</h3>
<p>Enjoy exciting prediction rounds.</p>
</div>
<div class="card">
<h3>Leaderboard</h3>
<p>Compete with top players.</p>
</div>
</section>
<footer>
© 2026 71 Lottery
</footer>
</body>
</html>
