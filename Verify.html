<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Verify OTP</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{
margin:0;
background:#f5f5f5;
font-family:Arial,sans-serif;
}
.header{
background:#f37f79;
color:white;
text-align:center;
padding:20px;
font-size:30px;
font-weight:bold;
}
.container{
padding:20px;
}
input{
width:100%;
padding:15px;
margin:10px 0;
border:none;
border-radius:12px;
font-size:16px;
box-sizing:border-box;
}
button{
width:100%;
padding:15px;
border:none;
border-radius:30px;
background:#f37f79;
color:white;
font-size:20px;
font-weight:bold;
}
</style>
</head>
<body>
<div class="header">71 CLUB</div>
<div class="container">
<input type="text" id="otp" placeholder="Enter OTP">
<button onclick="verifyOTP()">Verify OTP</button>
</div>
<script>
const supabase = window.supabase.createClient(
"https://ctpgqyofceymakikptyy.supabase.co",
"sb_publishable_2I0doPRyZKeSoV5MAuHA7g_VKk_ODUm"
);
async function verifyOTP(){
const email = localStorage.getItem("email");
const otp = document.getElementById("otp").value;
const { error } = await supabase.auth.verifyOtp({
email: email,
token: otp,
type: "email"
});
if(error){
alert(error.message);
}else{
alert("Login Successful");
window.location.href="index.html";
}
}
</script>
</body>
</html>
