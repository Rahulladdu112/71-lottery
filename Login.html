<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>71 Lottery Login</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}
body{
background:#0a0a0a;
color:white;
min-height:100vh;
}
.header{
background:linear-gradient(90deg,#6a11cb,#8e2de2);
padding:25px;
text-align:center;
font-size:34px;
font-weight:bold;
}
.note{
text-align:center;
padding:15px;
font-size:15px;
color:#cfcfcf;
}
.container{
width:90%;
max-width:400px;
margin:20px auto;
}
input{
width:100%;
padding:16px;
margin-bottom:15px;
border:none;
border-radius:15px;
background:#1c1c1c;
color:white;
font-size:16px;
outline:none;
}
.robot{
display:flex;
align-items:center;
gap:10px;
margin:15px 0;
font-size:16px;
}
.robot input{
width:20px;
height:20px;
margin:0;
}
.login-btn{
width:100%;
padding:16px;
border:none;
border-radius:30px;
background:linear-gradient(90deg,#6a11cb,#8e2de2);
color:white;
font-size:20px;
font-weight:bold;
cursor:pointer;
}
.register-btn{
width:100%;
padding:16px;
margin-top:12px;
border-radius:30px;
background:transparent;
border:2px solid #8e2de2;
color:#8e2de2;
font-size:20px;
font-weight:bold;
cursor:pointer;
}
</style>
</head>
<body>
<div class="header">
71 Lottery
</div>
<div class="note">
India's Largest Gaming Platform
</div>
<div class="container">
<div class="robot">
<input type="checkbox" id="robot">
<label for="robot">I am not a robot</label>
</div>
<button class="login-btn" onclick="loginUser()">
Login
</button>

Register
</div>
<script>
function loginUser(){
let username =
document.getElementById("username").value;
let password =
document.getElementById("password").value;
let robot =
document.getElementById("robot").checked;
if(username==="" || password===""){
alert("Please enter username and password");
return;
}
if(!robot){
alert("Please verify that you are not a robot");
return;
}
alert("Login Successful");
window.location.href="index.html";
}
</script>
</body>
</html>
